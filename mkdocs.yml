site_name: Yeliztli
site_description: Privacy-first personal-genomics analysis platform — run it on your own machine.
site_url: https://bioedca.github.io/Yeliztli/
repo_url: https://github.com/bioedca/Yeliztli
repo_name: bioedca/Yeliztli
edit_uri: edit/main/docs/
docs_dir: docs

# Fail the build on any broken internal link or page missing from the nav. This is
# the CI link-checker — it is also why pages are migrated into the nav in dependency
# order (a link can only be added once its target page exists).
strict: true

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

markdown_extensions:
  - abbr
  - admonition          # disclaimer / warning callouts
  - attr_list
  - def_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details    # collapsible callouts
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      # Single-source reusable fragments (e.g. the shared health disclaimer) live
      # under docs/_includes and are pulled in with `--8<--`.
      base_path: ["docs/_includes"]
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search

# Legacy guides and internal/maintainer material that has not yet been migrated into
# the nav. They are excluded from the build so `--strict` stays green; entries are
# removed as each is folded into a site page (later PRs).
exclude_docs: |
  _includes/
  setup-guide.md
  usage-guide.md
  expansion-second-wave-REMAINING.md
  sex_inference_threshold_validation.md
  lai-bundle-release-runbook.md
  lai-bundle-release-runbook-env.lock.yaml
  release-notes/
  internal/

nav:
  - Home: index.md
  - Intended use & disclaimers: intended-use.md
  - Privacy: privacy.md
  - Getting started:
      - getting-started/index.md
      - Install (quick start): getting-started/install-quickstart.md
      - Upload your DNA: getting-started/upload-your-dna.md
      - Reading your results: getting-started/reading-your-results.md
      - Multi-sample merging: getting-started/multi-sample-merging.md
  - Modules:
      - modules/index.md
      - Interpretation reference: modules/interpretation-reference.md
      - Health & hereditary risk:
          - Hereditary cancer: modules/health-risk/cancer.md
          - Cardiovascular: modules/health-risk/cardiovascular.md
          - Carrier status: modules/health-risk/carrier-status.md
          - Gene health: modules/health-risk/gene-health.md
          - Familial hypercholesterolemia: modules/health-risk/familial-hypercholesterolemia.md
          - Metabolic: modules/health-risk/metabolic.md
          - Bone density (eBMD): modules/health-risk/bone-density-ebmd.md
      - Pharmacogenomics: modules/pharma/pharmacogenomics.md
      - Wellness & traits:
          - Nutrigenomics: modules/wellness/nutrigenomics.md
          - Methylation: modules/wellness/methylation.md
          - Fitness: modules/wellness/fitness.md
          - Sleep: modules/wellness/sleep.md
          - Skin: modules/wellness/skin.md
          - Allergy & immune: modules/wellness/allergy.md
          - Traits & personality: modules/wellness/traits-personality.md
      - Ancestry: modules/ancestry/ancestry.md
      - Disclosure-gated:
          - APOE: modules/gated/apoe.md
          - Parkinson's (LRRK2): modules/gated/parkinsons.md
          - Sex-chromosome aneuploidy: modules/gated/sex-aneuploidy.md
      - Specialized findings: modules/specialized.md
      - Rare variants: modules/rare-variants.md
  - Features:
      - Variant Explorer: features/variant-explorer.md
      - Variant detail: features/variant-detail.md
      - Genome Browser: features/genome-browser.md
      - Query Builder: features/query-builder.md
      - Reports: features/reports.md
      - Export: features/export.md
      - Settings & admin: features/settings-and-admin.md
      - Keyboard shortcuts: features/keyboard-shortcuts.md
  - Install & self-host:
      - install/index.md
      - System requirements: install/system-requirements.md
      - Native install: install/native-install.md
      - Docker: install/docker.md
      - Setup wizard: install/setup-wizard.md
      - Reference data: install/reference-data.md
      - Configuration: install/configuration.md
      - Updating: install/updating.md
      - Backup & restore: install/backup-restore.md
      - Windows (WSL2): install/wsl2.md
      - Uninstall: install/uninstall.md
      - Troubleshooting: install/troubleshooting.md
  - Ancestry methods & validation: ancestry-methods.md
  - Develop:
      - develop/index.md
      - Architecture: develop/architecture.md
      - Development setup: develop/development-setup.md
      - Project structure: develop/project-structure.md
      - Testing: develop/testing.md
      - Contributing: develop/contributing.md
  - Maintainer:
      - maintainer/index.md
      - Bundle build & release: bundle-release-runbook.md
      - LAI bundle: maintainer/lai-bundle.md
      - App release process: maintainer/release-process.md
  - Attribution: attribution.md
